{% extends "base.html" %}
{% block title %}Admin{% endblock %}
{% block content %}
<h2>Admin Panel</h2>
<table>
  <tr><th>ID</th><th>Username</th><th>Password</th><th>Role</th><th>Email</th></tr>
  {% for u in users %}
  <tr>
    <td>{{ u.id }}</td>
    <td>{{ u.username }}</td>
    <td>{{ u.password }}</td>
    <td>{{ u.role }}</td>
    <td>{{ u.email }}</td>
  </tr>
  {% endfor %}
</table>
{% endblock %}
