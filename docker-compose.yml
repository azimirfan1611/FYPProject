version: '3.9'

# ZAP API key — generate with: python -c "import secrets; print(secrets.token_hex(16))"
# Set ZAP_KEY in your .env file or environment. Default shown here is INSECURE.
x-zap-key: &zap-key ${ZAP_KEY:-autopentest_changeme_key}

services:

  webapp:
    build:
      context: ./webapp
      dockerfile: Dockerfile
    container_name: vulnapp
    ports:
      - "5000:5000"
    environment:
      - DB_PATH=/tmp/webapp.db
      - FLASK_ENV=development
    networks:
      - pentest-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 10s
      timeout: 5s
      retries: 8

  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: zap
    command: >
      zap.sh -daemon
      -host 0.0.0.0 -port 8090
      -config api.addrs.addr.name=.*
      -config api.addrs.addr.regex=true
      -config api.key=${ZAP_KEY:-autopentest_changeme_key}
      -config scanner.threadPerHost=5
    environment:
      - ZAP_KEY=${ZAP_KEY:-autopentest_changeme_key}
    # ZAP port NOT exposed to host — accessible only within pentest-net
    expose:
      - "8090"
    networks:
      - pentest-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-sf",
             "http://localhost:8090/JSON/core/view/version/?apikey=${ZAP_KEY:-autopentest_changeme_key}"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  msf:
    image: metasploitframework/metasploit-framework:latest
    container_name: msf
    entrypoint: ["/bin/sh", "-c", "msfrpcd -P $$MSF_PASS -S false -a 0.0.0.0 -p 55553 -U msf"]
    expose:
      - "55553"
    environment:
      - MSF_PASS=${MSF_PASS:-msfrpc_pass}
    networks:
      - pentest-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  pentester:
    build:
      context: ./pentester
      dockerfile: Dockerfile
    container_name: pentester
    environment:
      - TARGET_URL=http://webapp:5000
      - ZAP_URL=http://zap:8090
      - ZAP_KEY=${ZAP_KEY:-autopentest_changeme_key}
      - MSF_HOST=msf
      - MSF_PORT=55553
      - MSF_PASS=${MSF_PASS:-msfrpc_pass}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - REPORT_DIR=/reports
      - SHANNON_MODE=${SHANNON_MODE:-true}
    volumes:
      - ./reports:/reports
    depends_on:
      webapp:
        condition: service_healthy
      zap:
        condition: service_healthy
    networks:
      - pentest-net

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: pentest_dashboard
    ports:
      - "8080:8080"
    environment:
      - ZAP_URL=http://zap:8090
      - ZAP_KEY=${ZAP_KEY:-autopentest_changeme_key}
      - MSF_HOST=msf
      - MSF_PORT=55553
      - MSF_PASS=${MSF_PASS:-msfrpc_pass}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - REPORT_DIR=/reports
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS:-changeme123!}
      - JWT_SECRET=${JWT_SECRET:-}
      - SHODAN_API_KEY=${SHODAN_API_KEY:-}
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY:-}
      - RATE_LIMIT_PER_MIN=${RATE_LIMIT_PER_MIN:-60}
      - SCAN_LIMIT_PER_MIN=${SCAN_LIMIT_PER_MIN:-3}
    volumes:
      - ./reports:/reports
    networks:
      - pentest-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    depends_on:
      zap:
        condition: service_healthy

networks:
  pentest-net:
    driver: bridge
